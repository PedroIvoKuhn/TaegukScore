<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placar</title>
  <link rel="stylesheet" href="../css/scoreboard.css">
</head>
<body>

  <div id="live-score-view">
    <section class="section">
      <div class="main-content">
        <div class="referees">
            <h2>Apresentação:</h2>
            <h3 id="current-athlete-name">Aguardando atleta...</h3>
            <p id="current-category-name"></p>
            <hr>
            <h3>Notas Individuais:</h3>
            <div id="individual-scores-container"></div>
        </div>
        <h1 id="score" class="score grid-item">-</h1>
        <h3 id="presentationAvg" class="gradeAvg grid-item">-</h3>
        <h3 id="accuracyAvg" class="accuracyAvg grid-item">-</h3>
      </div>
    </section>
  </div>

  <div id="leaderboard-view" style="display: none; padding: 2rem;">
    <h1 id="leaderboard-title"></h1>
    <ol id="leaderboard-list" style="font-size: 3rem; list-style-position: inside;"></ol>
  </div>

  <div id="video-view" style="display: none; width: 100vw; height: 100vh; background-color: black; display: flex; justify-content: center; align-items: center;">
    <video 
      id="looping-video"
      src="/videos/anuncio.mp4" 
      style="width: 100%; height: 100%; object-fit: contain;"
      autoplay 
      loop 
      muted 
      playsinline>
    </video>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="../scripts/scoreboard.js"></script>
</body>
</html>
