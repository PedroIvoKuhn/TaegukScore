<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaegukScore - Torneios</title>
  <link rel="stylesheet" href="/css/index.css"> <style>
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/">TaegukScore</a>
    <div class="nav-auth">
      <div id="nav-logged-out">
        <button id="login-btn">Login do Árbitro</button>
      </div>
      <div id="nav-logged-in" style="display: none;">
        <span id="username-display"></span>
        <button id="logout-btn">Logout</button>
      </div>
    </div>
  </nav>

  <main>
    <section id="admin-controls"">
      <h2>Painel do Administrador</h2>
      <button id="create-tournament-btn">Criar Novo Torneio</button>
      <button id="create-referee-btn">Criar Novo Árbitro</button>
    </section>
    <section class="tournament-list">
      <h1>Próximos Torneios</h1>
      <div id="tournaments-container">
        </div>
    </section>
  </main>

  <div id="login-modal" class="modal">
    <div class="modal-content">
        <div>
        <span class="close-button">&times;</span>
        <h2>Login do Árbitro</h2>
        </div>
        <form id="login-form">
        <div>
          <label for="username">Usuário:</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div>
          <label for="password">Senha:</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="form-actions">
        <button type="submit">Entrar</button>
        <p id="login-error"></p>
        </div>
      </form>
    </div>
  </div>

  <script src="/scripts/main.js"></script>
</body>
</html>
